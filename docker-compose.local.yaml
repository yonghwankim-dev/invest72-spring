services:
  app:
    ports:
      - "8080:8080"
    env_file:
      - .env.local
    extends:
      file: docker-compose.yaml
      service: app
  db:
    env_file:
      - .env.local
    extends:
      file: docker-compose.yaml
      service: db
  prometheus:
    image: prom/prometheus:latest
    container_name: invest72-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./invest72-config/prometheus.yaml:/etc/prometheus/prometheus.yaml
      - ./prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yaml'
      - '--storage.tsdb.path=/prometheus'
    extra_hosts:
      - "host.docker.internal:host-gateway"

