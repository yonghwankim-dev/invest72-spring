version: "3.8"
services:
  app:
    container_name: invest72-app
    image: nemo1107/invest72-app:latest
    ports:
      - "8080:8080"
    restart: always
    depends_on:
      - db
  db:
    container_name: invest72-db
    image: postgres:17
    restart: always
    environment:
      POSTGRES_USER: invest72
      POSTGRES_PASSWORD: invest72@
      POSTGRES_DB: invest72
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql
volumes:
  db-data:
