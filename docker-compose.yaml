version: "3.8"
services:
  app:
    container_name: invest72-app
    image: nemo1107/invest72-app:latest
    ports:
      - "8080:8080"
    restart: always
    depends_on:
      - db
    networks:
      - default
  db:
    container_name: invest72-db
    image: postgres:17
    restart: always
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql
    networks:
      - default
volumes:
  db-data:
networks:
  default:
    driver: bridge
