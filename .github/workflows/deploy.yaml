name: Deploy to GCP Compute Engine

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      branch_name:
        description: 'Branch to deploy'
        required: true
        default: 'main'

env:
  DOCKER_IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/invest72-app
  DEPLOY_PROFILE: production
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

jobs:
  ci:
    runs-on: ubuntu-latest
    environment: gcp-production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # 수동 배포 시 branch_name 사용, 아니면 트리거된 ref 사용
          ref: ${{ github.event.inputs.branch_name || github.ref }}
      ## JDK 설정
      - name: Set up JDK 17
        uses: actions/setup-java@v4.2.2
        with:
          java-version: '17'
          distribution: 'temurin'

      # gradle caching - 빌드 시간 향상
      - name: Gradle Caching
        uses: actions/cache@v4.2.2
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # gradlew 실행을 위해서 실행 권한을 부여
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew bootJar --no-daemon

      - name: Get Project Version
        id: get-version
        run: |
          PROJECT_VERSION=$(./gradlew properties | grep "^version:" | awk '{print $2}')
          echo "project_version=$PROJECT_VERSION" >> "$GITHUB_OUTPUT"
          echo "Project Version is $PROJECT_VERSION"

      - name: Set Image Tag
        id: set-image-tag
        run: |
          FULL_TAG="${{ env.DOCKER_IMAGE_NAME }}:${{ env.DEPLOY_PROFILE }}-${{ steps.get-version.outputs.project_version }}"
          echo "IMAGE_TAG=$FULL_TAG" >> "$GITHUB_ENV"
          echo "Full Image Tag is $FULL_TAG"

      - name: Build Docker Image
        run: |
          docker build --platform linux/amd64 \
          --build-arg PROJECT_VERSION=${{ steps.get-version.outputs.project_version }} \
          -t ${{ env.IMAGE_TAG }} \
          .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      # 푸시된 브랜치가 main 브랜치인 경우 docker latest 태그 추가
      - name: Tag Docker Image as Latest (Conditional)
        if: github.ref == 'refs/heads/main'
        run: |
          LATEST_TAG="${{ env.DOCKER_IMAGE_NAME }}:latest"
          docker tag ${{ env.IMAGE_TAG }} $LATEST_TAG
          echo "Tagged image as latest: $LATEST_TAG"
          # latest 태그 푸시
          docker push $LATEST_TAG

      - name: Push Docker Image to Docker Hub
        run: docker push ${{ env.IMAGE_TAG }}
  cd:
    needs: ci
    runs-on: ubuntu-latest
    environment: gcp-production
    steps:
      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: SSH into GCE and deploy
        env:
          # SSH 접속 시 yes/no 확인 절차 생략
          CLOUDSDK_CORE_DISABLE_PROMPTS: 1
        run: |
          gcloud compute ssh nemo@${{ secrets.GCE_INSTANCE_NAME }} \
            --zone=${{ secrets.GCE_INSTANCE_ZONE }} \
            --command='
              mkdir -p ~/invest72/config
              cd ~/invest72
          
              # .env 파일 생성
              cat << "EOF" > .env.production
              ${{ secrets.ENV }}
              EOF
          
              # 최신 설정 파일 다운로드 (또는 git pull)
              curl -O https://raw.githubusercontent.com/${{ github.repository }}/${{ github.event.inputs.branch_name || github.ref_name }}/docker-compose.yaml
              curl -O https://raw.githubusercontent.com/${{ github.repository }}/${{ github.event.inputs.branch_name || github.ref_name }}/docker-compose.production.yaml
          
              # GitHub Secrets에 저장된 원본 시크릿 내용을 서버 파일로 생성
              cat << "EOF" > ./config/application-secret.yaml
              ${{ secrets.APPLICATION_SECRET_YAML }}
              EOF
          
              # 기존 컨테이너 중지 및 최신 이미지 실행
              docker compose -f docker-compose.production.yaml pull
              docker compose -f docker-compose.production.yaml up -d --remove-orphans
            '
