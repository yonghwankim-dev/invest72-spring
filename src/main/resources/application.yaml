spring:
  profiles:
    include: secret
  datasource:
    url: ${DB_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        # 실행되는 SQL을 콘솔에 보기 좋게 출력
        format_sql: true
    show-sql: true

app:
  oauth2:
    authorized-redirect-uri: http://localhost:3000/
