<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Invest72</title>
    <!-- jquery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            max-width: 600px;
            margin: 20px auto;
        }

        h1 {
            color: #333;
        }

        form {
            background: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            background-color: #28a745;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #218838;
        }
    </style>

</head>
<body>
<h1>ьѕгВъљ ВѕўВЮх Ж│ёВѓ░ЖИ░</h1>
<form id="investmentForm">
    <label for="type">ьѕгВъљ ВюаьўЋ:</label>
    <select id="type" name="type">
        <!-- ВўѕЖИѕ/ВаЂЖИѕ -->
        <option value="ВўѕЖИѕ" selected>ВўѕЖИѕ</option>
    </select><br><br>

    <label for="amountType">ЖИѕВЋА ВюаьўЋ:</label>
    <select id="amountType" name="amountType">
        <!-- ВЮ╝ВІювХѕ/ВЏћ/вЁё -->
        <option value="ВЮ╝ВІювХѕ" selected>ВЮ╝ВІювХѕ</option>
    </select><br><br>

    <label for="amount">ЖИѕВЋА:</label>
    <input type="number" id="amount" name="amount" value="1000000" required><br><br>

    <label for="periodType">ЖИ░Ж░ё ВюаьўЋ:</label>
    <select id="periodType" name="periodType">
        <option value="ВЏћ">ВЏћ</option>
        <option value="вЁё" selected>вЁё</option>
    </select><br><br>

    <label for="periodValue">ЖИ░Ж░ё Ж░њ:</label>
    <input type="number" id="periodValue" name="periodValue" value="1" required><br><br>

    <label for="interestType">ВЮ┤Въљ ВюаьўЋ:</label>
    <select id="interestType" name="interestType">
        <option value="вІевдг" selected>вІевдг</option>
        <option value="в│хвдг">в│хвдг</option>
    </select><br><br>

    <label for="annualInterestRate">ВЌ░ВЮ┤ВъљВюе (%):</label>
    <input type="number" step="0.01" id="annualInterestRate" name="annualInterestRate"
           min="0.00" max="99.99" value="5.00" required><br><br>

    <label for="taxType">ВёИЖИѕ ВюаьўЋ:</label>
    <select id="taxType" name="taxType">
        <!-- ВЮ╝в░ўЖ│╝ВёИ/в╣ёЖ│╝ВёИ/ВёИЖИѕВџ░вїђ-->
        <option value="ВЮ╝в░ўЖ│╝ВёИ" selected>ВЮ╝в░ўЖ│╝ВёИ</option>
        <option value="в╣ёЖ│╝ВёИ">в╣ёЖ│╝ВёИ</option>
        <option value="ВёИЖИѕВџ░вїђ">ВёИЖИѕВџ░вїђ</option>
    </select><br><br>

    <label for="taxRate">ВёИВюе (%):</label>
    <input type="number" step="0.01" id="taxRate" name="taxRate" min="0.00" max="99.99" value="15.4" required><br><br>

    <br><br>

    <button type="submit">Ж│ёВѓ░ьЋўЖИ░</button>
</form>
<script>
    $(document).ready(function () {
        // ьЈ╝ ВаюВХю
        $('#investmentForm').on('submit', function (e) {
            e.preventDefault();
            requestCalculation('/investments/calculate', '/investments/calculate/result');
        });
    });

    function requestCalculation(url, resultPageUrl) {
        let formData = parseFormData();
        $.ajax({
            url: url,
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(formData),
            success: function (response) {
                sessionStorage.setItem('requestURL', url);
                // ВџћВ▓Г ВаЋв│┤вЦ╝ sessionStorageВЌљ ВађВъЦ
                sessionStorage.setItem('request', JSON.stringify(formData));
                // Ж▓░Ж│╝вЦ╝ sessionStorageВЌљ ВађВъЦ
                sessionStorage.setItem('calculationResult', JSON.stringify(response));
                // Ж▓░Ж│╝ ьјўВЮ┤ВДђвАю ВЮ┤вЈЎ
                window.location.href = resultPageUrl;
            },
            error: function (xhr, status, error) {
                alert('Ж│ёВѓ░ ВцЉ ВўцвЦўЖ░ђ в░юВЃЮьќѕВіхвІѕвІц: ' + error);
            }
        });
    }

    function parseFormData() {
        return {
            type: $('#type').val(),
            amountType: $('#amountType').val(),
            amount: parseFloat($('#amount').val()),
            periodType: $('#periodType').val(),
            periodValue: parseInt($('#periodValue').val()),
            interestType: $('#interestType').val(),
            annualInterestRate: parseFloat($('#annualInterestRate').val() / 100), // в░▒вХёВюеВЮё ВєїВѕўвАю в│ђьЎў
            taxType: $('#taxType').val(),
            taxRate: parseFloat($('#taxRate').val() / 100) // в░▒вХёВюеВЮё ВєїВѕўвАю в│ђьЎў
        };
    }
</script>
</body>
</html>
