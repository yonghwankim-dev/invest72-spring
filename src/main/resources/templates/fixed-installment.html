<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Invest72</title>
    <!-- jquery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            max-width: 600px;
            margin: 20px auto;
        }

        h1 {
            color: #333;
        }

        form {
            background: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            background-color: #28a745;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #218838;
        }
    </style>

</head>
<body>
<h1>нҲ¬мһҗ мҲҳмқө кі„мӮ°кё°</h1>
<form id="investmentForm">
    <label for="type">нҲ¬мһҗ мң нҳ•:</label>
    <select id="type" name="type">
        <option value="м ҒкёҲ">м ҒкёҲ</option>
    </select><br><br>

    <label for="amountType">кёҲм•Ў мң нҳ•:</label>
    <select id="amountType" name="amountType">
        <option value="мӣ”" selected>мӣ”</option>
        <option value="л…„">л…„</option>
    </select><br><br>

    <label for="amount">кёҲм•Ў:</label>
    <input type="number" id="amount" name="amount" value="1000000" required><br><br>

    <label for="periodType">кё°к°„ мң нҳ•:</label>
    <select id="periodType" name="periodType">
        <option value="мӣ”">мӣ”</option>
        <option value="л…„" selected>л…„</option>
    </select><br><br>

    <label for="periodValue">кё°к°„ к°’:</label>
    <input type="number" id="periodValue" name="periodValue" value="1" required><br><br>

    <label for="interestType">мқҙмһҗ мң нҳ•:</label>
    <select id="interestType" name="interestType">
        <option value="лӢЁлҰ¬" selected>лӢЁлҰ¬</option>
        <option value="ліөлҰ¬">ліөлҰ¬</option>
    </select><br><br>

    <label for="annualInterestRate">м—°мқҙмһҗмңЁ (%):</label>
    <input type="number" step="0.01" id="annualInterestRate" name="annualInterestRate"
           min="0.00" max="99.99" value="5.00" required><br><br>

    <label for="taxType">м„ёкёҲ мң нҳ•:</label>
    <select id="taxType" name="taxType">
        <!-- мқјл°ҳкіјм„ё/л№„кіјм„ё/м„ёкёҲмҡ°лҢҖ-->
        <option value="мқјл°ҳкіјм„ё" selected>мқјл°ҳкіјм„ё</option>
        <option value="л№„кіјм„ё">л№„кіјм„ё</option>
        <option value="м„ёкёҲмҡ°лҢҖ">м„ёкёҲмҡ°лҢҖ</option>
    </select><br><br>

    <label for="taxRate">м„ёмңЁ (%):</label>
    <input type="number" step="0.01" id="taxRate" name="taxRate" min="0.00" max="99.99" value="15.4" required><br><br>

    <br><br>

    <button type="submit">кі„мӮ°н•ҳкё°</button>
</form>
<script>
    $(document).ready(function () {
        // нҸј м ңм¶ң
        $('#investmentForm').on('submit', function (e) {
            e.preventDefault();
            requestCalculation('/investments/calculate/monthly', '/investments/calculate/monthly/result');
        });
    });

    function requestCalculation(url, resultPageUrl) {
        let formData = parseFormData();
        $.ajax({
            url: url,
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(formData),
            success: function (response) {
                sessionStorage.setItem('requestURL', url);
                // мҡ”мІӯ м •ліҙлҘј sessionStorageм—җ м ҖмһҘ
                sessionStorage.setItem('request', JSON.stringify(formData));
                // кІ°кіјлҘј sessionStorageм—җ м ҖмһҘ
                sessionStorage.setItem('calculationResult', JSON.stringify(response));
                // кІ°кіј нҺҳмқҙм§ҖлЎң мқҙлҸҷ
                window.location.href = resultPageUrl;
            },
            error: function (xhr, status, error) {
                alert('кі„мӮ° мӨ‘ мҳӨлҘҳк°Җ л°ңмғқн–ҲмҠөлӢҲлӢӨ: ' + error);
            }
        });
    }

    function parseFormData() {
        return {
            type: $('#type').val(),
            amountType: $('#amountType').val(),
            amount: parseFloat($('#amount').val()),
            periodType: $('#periodType').val(),
            periodValue: parseInt($('#periodValue').val()),
            interestType: $('#interestType').val(),
            annualInterestRate: parseFloat($('#annualInterestRate').val() / 100), // л°ұл¶„мңЁмқ„ мҶҢмҲҳлЎң ліҖнҷҳ
            taxType: $('#taxType').val(),
            taxRate: parseFloat($('#taxRate').val() / 100) // л°ұл¶„мңЁмқ„ мҶҢмҲҳлЎң ліҖнҷҳ
        };
    }
</script>
</body>
</html>
